
<!DOCTYPE html>
<html>
<head>
    <title>Mobile Price Predictor</title>
    <style>
        body {
            font-family: Arial;
            background: #f5f5f5;
        }
        .container {
            width: 400px;
            margin: 50px auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0px 0px 10px #ccc;
        }
        input, button {
            width: 100%;
            padding: 8px;
            margin-top: 8px;
        }
        button {
            background: #007bff;
            color: white;
            border: none;
            cursor: pointer;
        }
        h2 {
            text-align: center;
        }
        #result {
            margin-top: 15px;
            font-weight: bold;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Mobile Price Predictor</h2>

    <input id="brand" placeholder="Brand (REALME, SAMSUNG)" />
    <input id="ram" type="number" placeholder="RAM (GB)" />
    <input id="rom" type="number" placeholder="ROM (GB)" />
    <input id="expandable" type="number" placeholder="Expandable Storage (GB)" />
    <input id="camera" type="number" placeholder="Rear Camera (MP)" />
    <input id="battery" type="number" placeholder="Battery (mAh)" />
    <input id="rating" type="number" step="0.1" placeholder="Rating (1–5)" />

    <button onclick="predictPrice()">Predict Price</button>

    <div id="result"></div>
</div>

<script>
function predictPrice() {
    const data = {
        brand: document.getElementById("brand").value,
        RAM_GB: document.getElementById("ram").value,
        ROM_GB: document.getElementById("rom").value,
        Expandable_GB: document.getElementById("expandable").value,
        Rear_MP: document.getElementById("camera").value,
        Battery_mAh: document.getElementById("battery").value,
        rating: document.getElementById("rating").value
    };

    fetch("http://127.0.0.1:5000/predict", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify(data)
    })
    .then(response => response.json())
    .then(result => {
        document.getElementById("result").innerHTML =
            "Predicted Price: ₹ " + result.price;
    });
}
</script>

</body>
</html>
